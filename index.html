<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Privacy Policy • TideWatcher</title>
  <style>
    :root {
      --bg: #f1f5f9;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #0ea5e9;
      --accent2: #2563eb;
      --border: #e2e8f0;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    .header {
      background: linear-gradient(135deg, #0ea5e9, #2563eb);
      color: white;
      padding: 80px 20px 60px;
      text-align: center;
    }

    .header h1 {
      margin: 0;
      font-size: 2.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .header p {
      margin-top: 10px;
      opacity: 0.9;
    }

    .container {
      max-width: 900px;
      margin: -40px auto 80px;
      padding: 0 20px;
    }

    .card {
      background: var(--card);
      border-radius: 20px;
      padding: 40px 36px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
    }

    h2 {
      margin-top: 2.4rem;
      font-size: 1.35rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }

    h3 {
      margin-top: 1.4rem;
      font-size: 1.05rem;
      color: var(--accent2);
    }

    p { margin: 10px 0; }

    ul {
      margin-top: 10px;
      padding-left: 22px;
    }

    li { margin-bottom: 8px; }

    .updated {
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 10px;
    }

    a {
      color: var(--accent2);
      text-decoration: none;
      font-weight: 500;
    }

    a:hover { text-decoration: underline; }

    .footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 40px;
    }

    @media (max-width: 640px) {
      .header h1 { font-size: 2rem; }
      .card { padding: 28px 22px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>TideWatcher Privacy Policy</h1>
    <p>Transparent privacy for coastal data and tide predictions</p>
  </div>

  <div class="container">
    <div class="card">
      <p class="updated">Last updated: March 20, 2026</p>

      <!-- rest of content unchanged -->
